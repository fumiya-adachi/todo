services:
  next:
    build: .
    ports:
      - "3000:3000"
    working_dir: /app
    volumes:
      - .:/app
      - next_node_modules:/app/node_modules
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/todo
    depends_on:
      - db
    command: npm run dev

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: todo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  next_node_modules: